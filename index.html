<h2 class=wp-block-heading><span id=toc1>①制度の設計・基準の問題</span></h2>
<div class="wp-block-vk-blocks-spacer vk_spacer vk_spacer-type-margin-top"><div class=vk_block-margin-md--margin-top></div></div>
<figure class="wp-block-table is-style-vk-table-border"><table class=has-fixed-layout><thead><tr><th>疑問・問題意識<th>資料例<th>コメント・自分の意見<tbody><tr><td>1.<a href=images//sho-gai-seisin/ title>精神障害者手帳の更新が2年ごと、自立支援は毎年</a><td>厚労省・自治体公式ページ（例：<a rel=noopener target=_blank href="https://www.google.com/url?client=internal-element-cse&amp;cx=005876357619168369638:ydrbkuj3fss&amp;q=https://www.mhlw.go.jp/stf/shingi/2r9852000001vnm9-att/2r9852000001vota.pdf&amp;sa=U&amp;ved=2ahUKEwiAgJisjv6SAxVGhlYBHdrCGDIQFnoECAQQAQ&amp;usg=AOvVaw1vtkrcVgXFa0XWo7R41P4J&amp;fexp=73152292,73152290" title>精神障害者保健福祉手帳制度</a>）<br><br><a rel=noopener target=_blank href="https://www.google.com/url?client=internal-element-cse&amp;cx=005876357619168369638:ydrbkuj3fss&amp;q=https://www.mhlw.go.jp/web/t_doc%3FdataId%3D00ta4614%26dataType%3D1%26pageNo%3D1&amp;sa=U&amp;ved=2ahUKEwiAgJisjv6SAxVGhlYBHdrCGDIQFnoECAMQAQ&amp;usg=AOvVaw3A0ktlVD_YsLdQ8RcVtJbt&amp;fexp=73152292,73152290" title>実施要領 PDF</a>（精神障害者保健福祉手帳制度実施要領）<td>・制度上のルールとして「有効期間2年・再認定必須」は明記されている<br>・条文や要領には「治ることを前提」との記載はない<br>・専門家等の解説では、更新期間2年は改善や状態変化を見越した解釈として説明されているにすぎない<tr><td>2.<a href=images//tightening.html title>福祉に対する制度の締め付けはなぜ必要か</a><td><a rel=noopener target=_blank href=https://www.mhlw.go.jp/content/12201000/001568051.pdf title>厚労省の障害福祉サービス等の運用指針</a>（ガイドライン）<br><a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/417AC0000000123 title>障害者総合支援法</a>（根拠法）<br>自治体申請手引きページ<br>（障害者の日常生活及び社会生活を総合的に支援するための法律）<td>・制度は「公的資源の適正利用」や「不正受給防止」を目的としているが、実務上は申請・更新・報告の手続きが過剰で当事者・家族の負担が大きい<br>・条文やガイドラインでは「締め付け」や「負担軽減」のバランスについて具体的な記述はなく、現場運用に任されている部分が多い<br>・自分の疑問は、<strong>なぜ弱者や支援が必要な人にまで厳しい手続きが課されるのか</strong>という点にある<tr><td>3.<a href=images//fukusi-siryou/ title>弱者が救われない、負担が大きすぎる</a><br><td><strong>社会福祉関連統計</strong><br>・社会福祉施設の人数・受給者数<br>・支援の提供量と地域差<br><strong>支援の量・質が不足していることを示す報告書</strong><br>・介護・福祉従事者数の不足<br>・1人当たり負担件数や時間のデータ<td>・制度上は障害者や弱者の救済が謳われているが、実際には支援量・質が十分でなく、利用者や家族に過大な負担を課している。<br>・制度の理念と実態の乖離は大きく、弱者が制度の恩恵を受けられない事例が多発している。<tr><td>4.<a href=images//wages/ title>作業所の賃金が低すぎる</a><td><a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/417AC0000000123>障害者の日常生活及び社会生活を総合的に支援するための法律</a><br>厚生労働省統計<td>利用者にとって「安定」と「収入」の両立が極めて困難な構造となっている。<tr><td>5.勤労の義務を障害者にまで課す必要はない<td><a rel=noopener target=_blank href="https://laws.e-gov.go.jp/law/321CONSTITUTION?tab=cited" title>日本国憲法</a> 第27条<br><a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/417AC0000000123 title>障害者の日常生活及び社会生活を総合的に支援するための法律</a><br><a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/325AC0000000144 title>生活保護法</a><br><strong>報告書</strong><br>・安定的就労が困難なケース<br>・支援が負担となる事例<td>・憲法上の勤労義務は理念規定と解釈されることが一般的<br>・障害者に対して一律に強制労働が課されるわけではない<br>・ただし制度全体は「就労を前提」とする設計思想を持つ<tr><td>6.<a href=images//quality/ title>介護・福祉従事者の質と賃金の向上</a><td>・賃金水準<br>・人材不足の状況<br><td>・インフレに追従できない公定価格制度の限界。<br>・ 人材流動性が高すぎることによる、専門スキルの継承断絶。<br>・ 「自己犠牲」を前提とした処遇改善の限界と、従事者のメンタルヘルスの悪化。</table></figure>
<div class="wp-block-vk-blocks-spacer vk_spacer vk_spacer-type-margin-top"><div class=vk_block-margin-lg--margin-top></div></div>
<h2 class=wp-block-heading><span id=toc2>②現場との乖離</span></h2>
<div class="wp-block-vk-blocks-spacer vk_spacer vk_spacer-type-margin-top"><div class=vk_block-margin-md--margin-top></div></div>
<figure class="wp-block-table is-style-vk-table-border"><table class=has-fixed-layout><thead><tr><th>疑問・問題意識<th>資料例<th>コメント・自分の意見<tbody><tr><td>1.<a href=images//barrier/ title>バリアフリーは見た目だけで、生活改善になっていない</a><br>・バリアフリーは本当に生活を改善しているのか？<br>・物理的整備＝合理的配慮なのか？<br>・精神障害・発達障害への配慮はどこにあるのか？<td><a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/418AC0000000091/ title>バリアフリー法</a><br>（障害者の日常生活及び社会生活を総合的に支援するための法律）<br><a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/425AC0000000065/ title>障害者差別解消法</a><br>（障害を理由とする差別の解消の推進に関する法律）<td>・バリアフリーは物理的環境の整備に偏っている。<br>・精神障害や発達障害における社会的障壁は、空間設計の中に組み込まれていない。<br>・制度は整備されたように見えるが、実生活の困難は構造化されていない。<tr><td>2.<a href=images//consciousness/ title>障害者への意識が低い</a> → 政治家・行政・担当部署<td>・内閣府「障害者に関する世論調査」<br>・<a href=images//barrier//#pocket%20book>精神障害者手帳所持者数の推移（増加傾向）</a><br>・<a href=images//barrier//#development>発達障害診断数の増加</a><br>・障害者雇用率達成企業割合<td>・法制度上は差別禁止と理解促進が掲げられているが、意識変容は主として啓発・研修に委ねられている。<br>・精神障害に対する心理的距離は依然として課題とされている。<tr><td>3.<a href=images//company/ title>障害者差別解消法は企業向けで、余裕のある企業しか対応できない</a><td>・<a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/425AC0000000065>障害を理由とする差別の解消の推進に関する法律</a><br>・企業規模との関係<br><td>法律上は民間事業者にも合理的配慮義務が課されているが、過重な負担の有無は企業規模・財務状況等を考慮して判断される。<br>そのため、実務上は企業規模による対応力差が生じやすい構造となっている。<tr><td>4.<a href=images//procedure/ title>精神障害者手帳更新や自立支援の手続き</a><td>行政手続きマニュアル<br>・厚生労働省：障害者福祉のしおり（各自治体版）<br>・<a rel=noopener target=_blank href="https://www.google.com/search?q=https://www.wam.go.jp/content/wamnet/pcuser/shougai.html" title>WAM NET</a>（ワムネット）：障害福祉の仕組み<br>・<a rel=noopener target=_blank href="https://www.google.com/search?q=https://www.fukushihoken.metro.tokyo.lg.jp/shougai/shougai_shisaku/shiori/index.html" title>東京都福祉局</a>：福祉のしおり（サンプルとして優秀）<td>行政手続きの厳格化は「不正防止」や「公平性」を名目としているが、その副作用として生じる『事務的負荷』が、最も支援を必要とする「遂行能力の低い層」を制度から排除するフィルターとして機能してしまっている。</table></figure>
<div class="wp-block-vk-blocks-spacer vk_spacer vk_spacer-type-margin-top"><div class=vk_block-margin-lg--margin-top></div></div>
<h2 class=wp-block-heading><span id=toc3>③運用・配置の不平等</span></h2>
<figure class="wp-block-table is-style-vk-table-border"><table class=has-fixed-layout><thead><tr><th>疑問・問題意識<th>資料例<th>コメント・自分の意見<tbody><tr><td>1.<a href=images//hospitalization/ title>精神病棟の入院期間と地域受入れの不備</a><td>・厚生労働省「<a rel=noopener target=_blank href=https://www.mhlw.go.jp/toukei/list/10-20.html title>患者調査</a>」「<a rel=noopener target=_blank href="https://www.google.com/url?client=internal-element-cse&amp;cx=005876357619168369638:ydrbkuj3fss&amp;q=https://www.mhlw.go.jp/content/11121000/001374464.pdf&amp;sa=U&amp;ved=2ahUKEwjHvcTb0YOTAxXesFYBHaqqLA8QFnoECAcQAg&amp;usg=AOvVaw0-kAsndTAwRe9oJYEGcyAc&amp;fexp=73152292,73152290" title>精神保健福祉資料</a>」<br>・<a rel=noopener target=_blank href=https://www.who.int/teams/mental-health-and-substance-use/data-research/mental-health-atlas title>World Health Organization Mental Health Atlas</a><br>・<a rel=noopener target=_blank href=https://www.oecd.org/en/data/datasets/oecd-health-statistics.html title>OECD Health Statistics</a><td>・日本は精神科病床数および平均在院日数が国際的に見て高い水準にある。<br>・地域移行政策は進められているが、住居・人材・支援体制の地域差があり、退院後の受け皿が十分とは言えない状況が指摘されている。<tr><td>2.<a href=images//location/ title>障害者差別をなくすと言いながら、施設を辺鄙な場所に置く</a><td>・<a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/417AC0000000123 title>障害者の日常生活及び社会生活を総合的に支援するための法律</a><br>・<a rel=noopener target=_blank href=https://www8.cao.go.jp/shougai/suishin/law_h25-65.html title>障害を理由とする差別の解消の推進に関する法律</a><br>・<a rel=noopener target=_blank href=https://laws.e-gov.go.jp/law/418AC0000000091/ title>高齢者、障害者等の移動等の円滑化の促進に関する法律</a><td>・障害者支援施設は、土地価格や住民合意等の要因により郊外・交通不便地に設置される傾向がある。<br>・理念上は共生社会を掲げながら、空間上では分離が継続する構造が指摘されている。</table></figure>
<div class="wp-block-vk-blocks-spacer vk_spacer vk_spacer-type-margin-top"><div class=vk_block-margin-lg--margin-top></div></div>
